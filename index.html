<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teheshia Brooks - Contact Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            padding: 40px 30px 30px;
            text-align: center;
            color: white;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid white;
            margin: 0 auto 20px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .title {
            font-size: 15px;
            opacity: 0.95;
            font-weight: 400;
            line-height: 1.4;
            max-width: 400px;
            margin: 0 auto;
        }

        .content {
            padding: 35px 30px;
        }

        .contact-info {
            margin-bottom: 30px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            color: #374151;
            text-decoration: none;
            transition: all 0.3s ease;
            border-bottom: 1px solid #f3f4f6;
        }

        .contact-item:last-child {
            border-bottom: none;
        }

        .contact-item:hover {
            color: #1e3a8a;
            transform: translateX(5px);
        }

        .icon {
            width: 40px;
            height: 40px;
            background: #eff6ff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .contact-item:hover .icon {
            background: #1e3a8a;
        }

        .contact-item:hover .icon svg {
            stroke: white;
        }

        .contact-text {
            font-size: 15px;
            word-break: break-word;
        }

        .resume-button {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            text-align: center;
            padding: 16px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(30, 58, 138, 0.3);
            border: none;
            cursor: pointer;
        }

        .resume-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 58, 138, 0.4);
        }

        .resume-button:active {
            transform: translateY(0);
        }

        .resume-icon {
            display: inline-block;
            margin-right: 8px;
        }

        @media (max-width: 480px) {
            .card {
                border-radius: 0;
            }

            .header {
                padding: 30px 20px 20px;
            }

            .name {
                font-size: 24px;
            }

            .title {
                font-size: 14px;
            }

            .content {
                padding: 25px 20px;
            }

            .profile-image {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <img src="profile-photo.jpg" alt="Teheshia Brooks" class="profile-image">
            <h1 class="name">Teheshia Brooks</h1>
            <p class="title">Senior Cybersecurity Governance & Risk Program Leader</p>
        </div>

        <div class="content">
            <div class="contact-info">

                <a href="https://www.linkedin.com/in/teheshiabrooks" target="_blank" class="contact-item">

                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>

    </div>
